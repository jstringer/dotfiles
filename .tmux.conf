# ===========================================================================
# General
# ===========================================================================

set -g default-shell pwsh

# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1, not 0 (easier keyboard access)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Enable mouse support
set -g mouse on

# ===========================================================================
# Key Bindings
# ===========================================================================

# Reload config with prefix+r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (and stay in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Toggle zoom (maximize/restore a pane)
bind z resize-pane -Z

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
bind X kill-window

# Copy mode with vim keys
set-window-option -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ===========================================================================
# Status Bar
# ===========================================================================

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Status bar colors
set -g status-style "bg=#1e2030,fg=#c8d3f5"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#82aaff,fg=#1e2030,bold] #S #[bg=#1e2030,fg=#82aaff] "

# Right: host + time
set -g status-right-length 60
set -g status-right "#[fg=#636da6] %H:%M #[fg=#c8d3f5,bold]%d-%b-%Y "

# Window tabs
set -g window-status-format "#[fg=#636da6] #I:#W "
set -g window-status-current-format "#[bg=#2f334d,fg=#82aaff,bold] #I:#W #[bg=#1e2030,fg=#2f334d]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#2f334d"
set -g pane-active-border-style "fg=#82aaff"

# ===========================================================================
# Session Management
# ===========================================================================

# New named session
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# ===========================================================================
# PPM - PSMux Plugin Manager
# ===========================================================================
# Bootstrap: git clone https://github.com/psmux/psmux-plugins.git $env:TEMP\psmux-plugins
#            Copy-Item "$env:TEMP\psmux-plugins\ppm" "$env:USERPROFILE\.psmux\plugins\ppm" -Recurse
# Then press prefix + I to install plugins

set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-sensible'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @plugin 'psmux-plugins/psmux-continuum'
# psmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# psmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize PPM (keep this line at the very bottom)
run '~/.psmux/plugins/ppm/ppm.ps1'
